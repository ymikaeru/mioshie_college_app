<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Redefinir Senha — Caminho da Felicidade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Noto+Serif+JP:wght@400;700&display=swap">
  <link href="css/styles.min.css?v=44" rel="stylesheet">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    .reset-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-color);
      padding: 24px;
    }
    .reset-form-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: var(--shadow-premium);
    }
    .reset-form-card h1 {
      font-size: 1.5rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
    }
    .reset-form-card p.subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-color);
      color: var(--text-main);
      font-size: 1rem;
      font-family: var(--font-ui);
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .reset-submit-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      font-family: var(--font-ui);
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 8px;
    }
    .reset-submit-btn:hover { opacity: 0.85; }
    .reset-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .message {
      font-size: 0.85rem;
      text-align: center;
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      display: none;
    }
    .message.error {
      color: #ff3b30;
      background: rgba(255, 59, 48, 0.1);
      display: block;
    }
    .message.success {
      color: #34c759;
      background: rgba(52, 199, 89, 0.1);
      display: block;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 32px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
    }
    .back-link:hover { color: var(--text-main); }
    .loading-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
    .password-requirements {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="reset-page">
    <div class="reset-form-card">
      <h1 id="page-title">Redefinir Senha</h1>
      <p class="subtitle" id="page-subtitle">Escolha uma nova senha para sua conta</p>

      <div id="loading-state" style="text-align:center; padding: 20px 0;">
        <span class="loading-spinner" style="border-color: rgba(0,0,0,0.1); border-top-color: var(--accent);"></span>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 12px;">Verificando link...</p>
      </div>

      <form id="reset-form" class="hidden">
        <div class="form-group">
          <label for="new-password">Nova Senha</label>
          <input type="password" id="new-password" minlength="6" placeholder="Mínimo 6 caracteres">
          <p class="password-requirements">A senha deve ter pelo menos 6 caracteres.</p>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirmar Senha</label>
          <input type="password" id="confirm-password" minlength="6" placeholder="Repita a nova senha">
        </div>
        <button type="submit" class="reset-submit-btn" id="submit-btn">Salvar Nova Senha</button>
        <div id="form-message" class="message"></div>
      </form>

      <div id="success-state" class="hidden" style="text-align: center; padding: 20px 0;">
        <p style="font-size: 2rem; margin-bottom: 12px;">✓</p>
        <p style="color: var(--text-main); font-weight: 500;">Senha atualizada!</p>
        <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 8px;">Você já pode fazer login com sua nova senha.</p>
        <a href="login.html" class="back-link" style="margin-top: 24px;">Ir para o login →</a>
      </div>

      <a href="login.html" class="back-link" id="back-link">← Voltar ao login</a>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
    }
  }
  </script>
  <script type="module">
    import { createClient } from '@supabase/supabase-js';

    const supabase = createClient('https://succhmnbajvbpmoqrktq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1Y2NobW5iYWp2YnBtb3Fya3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NjY3MDgsImV4cCI6MjA5MjA0MjcwOH0.humCcLYpnnnapkLtLOeb9ZVo5EZWoWw6ItNo0WVY3DY');

    const loadingState = document.getElementById('loading-state');
    const resetForm = document.getElementById('reset-form');
    const successState = document.getElementById('success-state');
    const pageTitle = document.getElementById('page-title');
    const pageSubtitle = document.getElementById('page-subtitle');
    const backLink = document.getElementById('back-link');
    const formMessage = document.getElementById('form-message');

    let recoveryMode = false;

    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY' && session) {
        recoveryMode = true;
        loadingState.classList.add('hidden');
        resetForm.classList.remove('hidden');
        pageTitle.textContent = 'Nova Senha';
        pageSubtitle.textContent = 'Escolha uma nova senha para sua conta';
        backLink.textContent = '← Voltar ao login';
      }
    });

    async function init() {
      const { data: { session } } = await supabase.auth.getSession();
      const urlParams = new URLSearchParams(window.location.search);
      const error = urlParams.get('error');
      const errorDescription = urlParams.get('error_description');

      if (error) {
        loadingState.classList.add('hidden');
        showError(errorDescription || 'Link expirado ou inválido. Solicite um novo link.');
        return;
      }

      if (session) {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
          recoveryMode = true;
          loadingState.classList.add('hidden');
          resetForm.classList.remove('hidden');
          pageTitle.textContent = 'Nova Senha';
          pageSubtitle.textContent = 'Escolha uma nova senha para sua conta';
          backLink.textContent = '← Voltar ao login';
          return;
        }
      }

      loadingState.classList.add('hidden');
      pageTitle.textContent = 'Esqueceu a Senha?';
      pageSubtitle.textContent = 'Digite seu email para receber um link de redefinição';
      backLink.textContent = '← Voltar ao login';
      showEmailForm();
    }

    function showEmailForm() {
      resetForm.classList.remove('hidden');
      const newPassGroup = document.getElementById('new-password').parentElement;
      const confirmGroup = document.getElementById('confirm-password').parentElement;
      newPassGroup.classList.add('hidden');
      confirmGroup.classList.add('hidden');

      const emailInput = document.createElement('input');
      emailInput.type = 'email';
      emailInput.id = 'reset-email';
      emailInput.required = true;
      emailInput.placeholder = 'seu@email.com';
      emailInput.autocomplete = 'email';
      const label = document.createElement('label');
      label.htmlFor = 'reset-email';
      label.textContent = 'Email';
      const group = document.createElement('div');
      group.className = 'form-group';
      group.appendChild(label);
      group.appendChild(emailInput);
      resetForm.insertBefore(group, resetForm.firstChild);

      document.getElementById('submit-btn').textContent = 'Enviar Link de Redefinição';

      resetForm.onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('reset-email').value.trim();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span>Enviando...';

        try {
          const { error } = await supabase.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/mioshie_college_app/reset-password.html'
          });
          if (error) throw error;
          showSuccess('Link enviado! Verifique seu email.');
        } catch (err) {
          showError(err.message || 'Erro ao enviar link. Tente novamente.');
        }

        btn.disabled = false;
        btn.textContent = 'Enviar Link de Redefinição';
      };
    }

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!recoveryMode) return;

      const newPass = document.getElementById('new-password').value;
      const confirmPass = document.getElementById('confirm-password').value;
      const btn = document.getElementById('submit-btn');

      if (newPass !== confirmPass) {
        showMessage('As senhas não coincidem.', 'error');
        return;
      }

      if (newPass.length < 6) {
        showMessage('A senha deve ter pelo menos 6 caracteres.', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner"></span>Salvando...';

      try {
        const { error } = await supabase.auth.updateUser({ password: newPass });
        if (error) throw error;

        await supabase.auth.signOut();

        resetForm.classList.add('hidden');
        successState.classList.remove('hidden');
        pageTitle.textContent = 'Senha Atualizada';
        pageSubtitle.textContent = '';
        backLink.classList.add('hidden');
      } catch (err) {
        showMessage(err.message || 'Erro ao atualizar senha. Tente novamente.', 'error');
      }

      btn.disabled = false;
      btn.textContent = 'Salvar Nova Senha';
    });

    function showMessage(text, type) {
      formMessage.textContent = text;
      formMessage.className = 'message ' + type;
    }

    function showError(text) {
      loadingState.classList.add('hidden');
      pageTitle.textContent = 'Erro';
      pageSubtitle.textContent = text;
      pageSubtitle.style.color = '#ff3b30';
    }

    function showSuccess(text) {
      resetForm.classList.add('hidden');
      pageTitle.textContent = '✓ Link Enviado';
      pageSubtitle.textContent = text;
      pageSubtitle.style.color = '#34c759';
    }

    init();
  </script>
</body>
</html>
